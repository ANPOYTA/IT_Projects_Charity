</head>

<body>

    <header class="header">
        <div class="logo">
            <a href="index.html"><img src="images/logo.svg" alt="Разом"></a>
        </div>
        <nav class="menu">
            <a href="index.html">Головна</a>
            <a href="index.html#about">Про нас</a>
            <a href="donations.html">Актуальні збори</a>
        </nav>

        <div class="burger-btn" id="burger-btn">
            <span></span>
            <span></span>
            <span></span>
        </div>
    
        <div class="header-user-block">
            <div class="header-user-text">
                <span class="header-user-name" id="profile-name">Завантаження...</span>
                <span class="header-user-email" id="profile-email">...</span>
            </div>
        
            <div class="user-menu-container" id="user-menu-container">
                <button class="user-icon-btn" id="user-icon-btn">
                    <img src="images/user.svg" alt="Профіль" class="header-avatar">
                </button>
        
                <div class="user-dropdown hidden" id="user-dropdown">
                    <a href="profile.html" class="dropdown-item">Мій профіль</a>
                    <button class="dropdown-item" id="logout-btn" style="width: 100%; text-align: left;">Вийти</button>
                </div>
            </div>
        </div>
    </header>

        <main class="profile-page">
        <div class="profile-tabs">
            <button class="tab-btn active" id="btn-donations" onclick="switchTab('donations')">Мої донати</button>
            <button class="tab-btn" id="btn-campaigns" onclick="switchTab('campaigns')">Мої збори</button>
        </div>

        <div id="tab-donations" class="tab-content active">
            <div id="my-donations-grid">
                <p class="empty-message">Тут будуть відображатися збори, які ви підтримали.</p>
            </div>
        </div>

        <div id="tab-campaigns" class="tab-content hidden">
            <div id="unverified-view" class="unverified-container">
                <p>Щоб розмістити свій збір, необхідно верифікувати особу</p>
                <a href="verification.html" class="btn-large-green">Пройти верифікацію</a>
            </div>

            <div id="verified-view" class="verified-container hidden">
                <div id="my-campaigns-grid"></div>
                <div style="margin-top: 30px;">
                    <a href="create-campaign.html" class="btn-large-green">Розмістити збір</a>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-logo">
            <img src="images/logo-large.svg" alt="Разом великий логотип">
        </div>
        <p>&copy; 2026 Розрахункова робота. Управління IT-проєктами.</p>
    </footer>

    <script>
        const API_URL = 'https://charity-backend-aiyz.onrender.com'; 

        document.addEventListener("DOMContentLoaded", () => {
            const token = localStorage.getItem('jwt_token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            loadUserProfile(token);
            fetchMyDonations(token);
            fetchMyCampaigns(token);
            setupDropdown();
            setupBurgerMenu();
        });

        function setupDropdown() {
                const userIconBtn = document.getElementById('user-icon-btn');
                const userDropdown = document.getElementById('user-dropdown');
                const logoutBtn = document.getElementById('logout-btn');
                const userMenuContainer = document.getElementById('user-menu-container');

                if (userIconBtn && userDropdown) {
                    userIconBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        userDropdown.classList.toggle('hidden');
                    });

                    document.addEventListener('click', (e) => {
                        if (!userMenuContainer.contains(e.target)) {
                            userDropdown.classList.add('hidden');
                        }
                    });
                }

                if (logoutBtn) {
                    logoutBtn.addEventListener('click', () => {
                        localStorage.removeItem('jwt_token');
                        window.location.href = 'index.html'; 
                    });
                }
            }

        async function loadUserProfile(token) {
            try {
                const response = await fetch(`${API_URL}/users/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!response.ok) throw new Error('Не вдалося завантажити профіль');

                const user = await response.json();

                document.getElementById('profile-name').textContent = user.full_name;
                document.getElementById('profile-email').textContent = user.email;

                const userAvatarImg = document.querySelector('.header-avatar');
                if (userAvatarImg) {
                    const defaultAvatar = 'images/user.svg'; 
                    userAvatarImg.src = user.avatar_url ? user.avatar_url : defaultAvatar;
            
                    userAvatarImg.onerror = function() {
                        this.src = defaultAvatar;
                    };
                }

                if (user.verification_status === 'verified') {
                    document.getElementById('verified-view').classList.remove('hidden');
                    document.getElementById('unverified-view').classList.add('hidden');
                } else {
                    document.getElementById('unverified-view').classList.remove('hidden');
                    document.getElementById('verified-view').classList.add('hidden');
                }
            } catch (error) {
                console.error(error);
            }
        }

        async function fetchMyDonations(token) {
            const grid = document.getElementById('my-donations-grid');
            try {
                const response = await fetch(`${API_URL}/users/me/donations`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const donations = await response.json();

                if (donations.length === 0) {
                    grid.innerHTML = '<p class="empty-message">Тут будуть відображатися збори, які ви підтримали.</p>';
                    return;
                }

                grid.innerHTML = '';
                donations.forEach(campaign => grid.insertAdjacentHTML('beforeend', createCardHTML(campaign)));
                animateProgressBars();
            } catch (error) {
                grid.innerHTML = '<p class="empty-message">Помилка завантаження донатів.</p>';
            }
        }

        async function fetchMyCampaigns(token) {
            const grid = document.getElementById('my-campaigns-grid');
            try {
                const response = await fetch(`${API_URL}/users/me/campaigns`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const campaigns = await response.json();

                if (campaigns.length === 0) {
                    grid.innerHTML = '<p class="empty-message">Ви ще не створили жодного збору.</p>';
                    return;
                }

                grid.innerHTML = '';
                campaigns.forEach(campaign => grid.insertAdjacentHTML('beforeend', createCardHTML(campaign)));
                animateProgressBars();
            } catch (error) {
                grid.innerHTML = '<p class="empty-message">Помилка завантаження ваших зборів.</p>';
            }
        }

        function createCardHTML(campaign) {
            const percent = Math.min((campaign.current_amount / campaign.goal_amount) * 100, 100).toFixed(0);
            return `
                    <div class="card">
                        <div class="card-image-wrapper">
                            <img src="${campaign.image_url || 'images/default-campaign.jpg'}" class="card-image">
                        </div>
                        <div class="card-info">
                            <h3>${campaign.title}</h3>
                            <p class="description">${campaign.description}</p>
                            <div class="progress-container">
                                <div class="progress-labels">
                                    <span>Зібрано: ${campaign.current_amount.toLocaleString()} ₴</span>
                                    <span>Ціль: ${campaign.goal_amount.toLocaleString()} ₴</span>
                                </div>
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width: 0%;" data-target="${percent}%"></div>
                                </div>
                            </div>
                            <a href="${campaign.payment_url || '#'}" target="_blank" class="btn btn-primary btn-full">Задонатити</a>
                        </div>
                    </div>`;
        }

        function switchTab(tabName) {
            document.getElementById('btn-donations').classList.toggle('active', tabName === 'donations');
            document.getElementById('btn-campaigns').classList.toggle('active', tabName === 'campaigns');
            document.getElementById('tab-donations').classList.toggle('hidden', tabName !== 'donations');
            document.getElementById('tab-campaigns').classList.toggle('hidden', tabName !== 'campaigns');
        }

        function animateProgressBars() {
            setTimeout(() => {
                document.querySelectorAll('.progress-fill').forEach(bar => {
                    bar.style.width = bar.getAttribute('data-target');
                });
            }, 100);
        }

        function setupBurgerMenu() {
                const burgerBtn = document.getElementById('burger-btn');
                const menu = document.querySelector('.menu');

                if (burgerBtn && menu) {
                    burgerBtn.addEventListener('click', () => {
                        menu.classList.toggle('active');
                    });
                }
            }
    </script>
    
</body>

</html>
