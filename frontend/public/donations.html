<body>

    <header class="header">
        <div class="logo">
            <a href="index.html"><img src="images/logo.svg" alt="Разом"></a>
        </div>
        <nav class="menu">
            <a href="index.html">Головна</a>
            <a href="index.html#about">Про нас</a>
            <a href="donations.html" class="active">Актуальні збори</a>
        </nav>
        <div class="burger-btn" id="burger-btn">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="auth">
            <a href="login.html" class="btn btn-primary" id="login-btn">Sign In &rarr;</a>
        
            <div class="user-menu-container hidden" id="user-menu-container">
                <button class="user-icon-btn" id="user-icon-btn">
                    <img src="images/user.svg" alt="Профіль" class="header-avatar">
                </button>
            
                <div class="user-dropdown hidden" id="user-dropdown">
                    <a href="profile.html" class="dropdown-item">Мій профіль</a>
                    <button class="dropdown-item" id="logout-btn" style="width: 100%; text-align: left;">Вийти</button>
                </div>
            </div>
        </div>
    </header>

    <section class="donations" style="padding-top: 40px; min-height: 70vh;">
        <div class="donations-header">
            <h2>Всі актуальні збори</h2>
        </div>

        <div class="donations-grid" id="all-campaigns-grid">
            <p>Завантаження зборів...</p>
        </div>
    </section>

    <footer class="footer">
        <div class="footer-logo">
            <img src="images/logo-large.svg" alt="Разом великий логотип">
        </div>
        <p>&copy; 2026 Розрахункова робота. Управління IT-проєктами.</p>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            fetchAllCampaigns();
            checkAuthState();
            setupDropdown();
            setupBurgerMenu();
        });

        async function fetchAllCampaigns() {
            const grid = document.getElementById('all-campaigns-grid');

            try {
                const response = await fetch('https://charity-backend-aiyz.onrender.com/campaigns/');

                if (!response.ok) throw new Error('Помилка мережі');

                const campaigns = await response.json();
                grid.innerHTML = '';

                campaigns.forEach(campaign => {
                    const percent = Math.min((campaign.current_amount / campaign.goal_amount) * 100, 100).toFixed(0);
                    const verifiedIcon = campaign.is_author_verified ? '✓' : '';
                    const imageUrl = campaign.image_url || 'images/default-campaign.jpg';

                    const cardHTML = `
                        <div class="card">
                            <div class="card-image-wrapper">
                                <img src="${imageUrl}" class="card-image" alt="Фото збору">
                            </div>
                            <div class="card-info">
                                <div class="author">
                                    <span class="author-name">${campaign.author_name} <span style="color: #1DA1F2;">${verifiedIcon}</span></span>
                                </div>
                                <h3>${campaign.title}</h3>
                                <p class="description">${campaign.description}</p>
                                <div class="progress-container">
                                    <div class="progress-labels">
                                        <span>Зібрано: ${campaign.current_amount.toLocaleString('uk-UA')} ₴</span>
                                        <span>Ціль: ${campaign.goal_amount.toLocaleString('uk-UA')} ₴</span>
                                    </div>
                                    <div class="progress-bar">
                                        <div class="progress-fill" style="width: 0%;" data-target="${percent}%"></div>
                                    </div>
                                </div>
                              <a href="${campaign.payment_url || '#'}" target="_blank" rel="noopener noreferrer" class="btn btn-primary btn-full">Задонатити</a>
                            </div>
                        </div>
                    `;

                    grid.insertAdjacentHTML('beforeend', cardHTML);
                });

                animateProgressBars();

            } catch (error) {
                console.error("Не вдалося завантажити збори:", error);
                grid.innerHTML = '<p>Помилка завантаження даних. Спробуйте пізніше або перевірте підключення до сервера.</p>';
            }
        }

        function animateProgressBars() {
            const progressBars = document.querySelectorAll('.progress-fill');
            setTimeout(() => {
                progressBars.forEach(bar => {
                    const targetWidth = bar.getAttribute('data-target');
                    bar.style.width = targetWidth;
                });
            }, 100);
        }

        function checkAuthState() {
                const token = localStorage.getItem('jwt_token');
                const loginBtn = document.getElementById('login-btn');
                const userMenu = document.getElementById('user-menu-container');

                if (token) {
                    loginBtn.classList.add('hidden');
                    userMenu.classList.remove('hidden');
                } else {
                    loginBtn.classList.remove('hidden');
                    userMenu.classList.add('hidden');
                }
            }

        function setupDropdown() {
                const userIconBtn = document.getElementById('user-icon-btn');
                const userDropdown = document.getElementById('user-dropdown');
                const logoutBtn = document.getElementById('logout-btn');
                const userMenuContainer = document.getElementById('user-menu-container');

                if (userIconBtn && userDropdown) {
                    userIconBtn.addEventListener('click', (e) => {
                        e.stopPropagation(); 
                        userDropdown.classList.toggle('hidden');
                    });

                    document.addEventListener('click', (e) => {
                        if (!userMenuContainer.contains(e.target)) {
                            userDropdown.classList.add('hidden');
                        }
                    });
                }

                if (logoutBtn) {
                    logoutBtn.addEventListener('click', () => {
                        localStorage.removeItem('jwt_token');
                        window.location.reload();
                    });
                }
            }

        function setupBurgerMenu() {
                const burgerBtn = document.getElementById('burger-btn');
                const menu = document.querySelector('.menu');

                if (burgerBtn && menu) {
                    burgerBtn.addEventListener('click', () => {
                        menu.classList.toggle('active');
                    });
                }
            }
    </script>
</body>

</html>
