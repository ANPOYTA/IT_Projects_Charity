<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація — Разом</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript"
        src="https://appleid.cdn-apple.com/appleauth/static/jsapi/appleid/1/en_US/appleid.auth.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
    <div class="auth-page">
        <div class="auth-left">
            <div class="auth-form-container">
                <h1>Реєстрація</h1>

                <form id="signup-form" style="margin-top: 30px;">
                    <div class="form-group">
                        <label for="name">Ім'я</label>
                        <input type="text" id="name" placeholder="Введіть ваше ім'я" required>
                    </div>
                
                    <div class="form-group">
                        <label for="surname">Прізвище</label>
                        <input type="text" id="surname" placeholder="Введіть ваше прізвище" required>
                    </div>
                
                    <div class="form-group">
                        <label for="phone">Номер телефону</label>
                        <input type="tel" id="phone" placeholder="+380XXXXXXXXX" required>
                    </div>
                
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="Введіть ваш email" required>
                    </div>
                
                    <div class="form-group">
                        <label for="password">Пароль</label>
                        <input type="password" id="password" placeholder="Введіть ваш пароль" required>
                    </div>
                
                    <div class="form-checkbox">
                        <input type="checkbox" id="terms" required>
                        <label for="terms">Я приймаю умови</label>
                    </div>
                
                    <button type="submit" class="btn btn-primary btn-full">Зареєструватись</button>
                </form>

                <div class="auth-divider">
                    <span>Або</span>
                </div>

                <div class="social-login">
                    <button type="button" id="google-btn" class="btn-social">
                        <img src="images/google.svg" alt="Google"> Sign in with Google
                    </button>
                    <button type="button" id="appleid-signin" class="btn-social">
                        <img src="images/apple.svg" alt="Apple"> Sign in with Apple
                    </button>
                </div>

                <p class="auth-footer">
                    Маєте акаунт? <a href="login.html">Увійти</a>
                </p>
            </div>
        </div>

        <div class="auth-right"></div>
    </div>
</body>

<script>
    function handleGoogleResponse(response) {
        console.log("Токен від Google отримано!", response.credential);

        fetch('http://ТВІЙ_БЕКЕНД/api/auth/google', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ token: response.credential })
        })
            .then(res => res.json())
            .then(data => {
                console.log("Успішний вхід!", data);
                localStorage.setItem('jwt_token', data.access_token);
                window.location.href = 'profile.html';
            })
            .catch(error => console.error('Помилка авторизації на бекенді:', error));
    }

    window.onload = function () {
        google.accounts.id.initialize({
            client_id: "ТЮДИ_ВСТАВИТИ_CLIENT_ID_ВІД_БЕКЕНДЕРА.apps.googleusercontent.com",
            callback: handleGoogleResponse
        });

        const googleButton = document.getElementById('google-btn');
        googleButton.addEventListener('click', () => {
            google.accounts.id.prompt(); 
        });
    };

    document.addEventListener("DOMContentLoaded", () => {
        const signupForm = document.getElementById('signup-form');

        signupForm.addEventListener('submit', async (event) => {
          event.preventDefault(); // Зупиняємо стандартне відправлення форми (захист від 405)

        // Збираємо дані прямо з полів (точно за назвами твоєї нової моделі UserRegisterRequest)
          const payload = {
              name: document.getElementById('name').value.trim(),
               surname: document.getElementById('surname').value.trim(),
               phone: document.getElementById('phone').value.trim(),
               email: document.getElementById('email').value.trim(),
               password: document.getElementById('password').value
            };

           try {
               const response = await fetch('http://127.0.0.1:8000/users/', {
                    method: 'POST',
                   headers: {
                       'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
               });

                if (response.ok) {
                    alert("Реєстрація успішна! Тепер увійдіть.");
                    window.location.href = 'login.html';
                } else {
                    const errorData = await response.json();
                    alert("Помилка: " + (errorData.detail || "Не вдалося зареєструватися"));
                }
            } catch (error) {
                console.error("Сервер не відповідає:", error);
                alert("Помилка з'єднання з сервером.");
            }
        });
    });
</script>

</html>
